version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: menu_qr
      POSTGRES_USER: menu_qr
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_SECRET: change-me-long-random-secret
      DATABASE_URL: postgresql://menu_qr:change-me@db:5432/menu_qr?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm run start"
    restart: unless-stopped

volumes:
  postgres_data:
