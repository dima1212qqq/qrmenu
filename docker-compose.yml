services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: menu_qr
      POSTGRES_USER: menu_qr
      POSTGRES_PASSWORD: Daster207
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_SECRET: "zvR6HbMO+cVZt7g1nosCrv/o3zd0uTwx8kwZqSsifcw="
      NEXTAUTH_SECRET: "zvR6HbMO+cVZt7g1nosCrv/o3zd0uTwx8kwZqSsifcw="
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "https://menuqrcode.ru"
      NEXTAUTH_URL: "https://menuqrcode.ru"
      DATABASE_URL: "postgresql://menu_qr:Daster207@db:5432/menu_qr?schema=public"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data: